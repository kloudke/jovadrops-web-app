apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jovadrops-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - jovadrops.example.com
      secretName: jovadrops-tls
  rules:
    - host: jovadrops.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jovadrops-web-svc
                port:
                  number: 80

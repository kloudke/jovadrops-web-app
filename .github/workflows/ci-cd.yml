name: CI-CD Pipeline

on:
  push:
    branches: [main, dev, staging]
    paths:
      - 'src/**'
      - 'frontend/**'
      - 'backend/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'next.config.ts'
      - 'next.config.js'
      - 'eslint.config.mjs'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'frontend/**'
      - 'backend/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'next.config.ts'
      - 'next.config.js'
      - 'eslint.config.mjs'
  workflow_dispatch:

env:
  NODE_VERSION: '24'
  REGISTRY: docker.io
  FRONTEND_IMAGE: kloudke/jovadrops-frontend
  BACKEND_IMAGE: kloudke/jovadrops-backend

jobs:
  frontend-quality:
    name: Frontend Quality & Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Type checking
        run: npx tsc --noEmit

      - name: Security audit
        run: npm audit --audit-level=high

  frontend-test:
    name: Frontend Testing
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run automated tests
        run: npm test

  backend-quality:
    name: Backend Quality & Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript & Prisma
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high

  docker-build-push:
    name: Build & Push Docker Images
    needs: [frontend-quality, frontend-test, backend-quality]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Frontend Image ---
      - name: Extract frontend metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short

      - name: Build and export Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:scan-target-frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy scanner on Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:scan-target-frontend'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'CRITICAL,HIGH'

      - name: Push Frontend image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha

      # --- Backend Image ---
      - name: Extract backend metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short

      - name: Build and export Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:scan-target-backend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy scanner on Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:scan-target-backend'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'CRITICAL,HIGH'

      - name: Push Backend image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha

  deploy:
    name: Deploy Application
    needs: [docker-build-push]
    runs-on:
      group: k8s
      labels: self-hosted
    if: github.event_name != 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Option 1: Kubernetes Deployment with Helm ---
      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}
      
      - name: Deploy to Kubernetes with Helm
        run: |
          helm upgrade --install jovadrops infrastructure/k8s/helm \
            --namespace jovadrops \
            --create-namespace \
            --set frontend.image.repository=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }} \
            --set frontend.image.tag=sha-${GITHUB_SHA::7} \
            --set backend.image.repository=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }} \
            --set backend.image.tag=sha-${GITHUB_SHA::7}

      # # --- Option 2: AWS ECS Deployment ---
      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: us-east-1
      

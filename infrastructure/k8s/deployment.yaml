apiVersion: apps/v1
kind: Deployment
metadata:
  name: jovadrops-web
  namespace: jovadrops
  labels:
    app.kubernetes.io/name: jovadrops-web
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: jovadrops-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jovadrops-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001 # Matches the Next.js Dockerfile nextjs user
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/your-org/jovadrops-web-app:latest # Replace with your actual registry
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          envFrom:
            - configMapRef:
                name: jovadrops-config
            - secretRef:
                name: jovadrops-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # Next.js standalone writes to .next
            capabilities:
              drop:
                - ALL

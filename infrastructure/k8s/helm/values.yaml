# ================================================
# Frontend (Next.js) settings
# ================================================
frontend:
  name: "jovadrops-frontend"
  port: 3000
  replicas: 3
  image:
    repository: "docker.io/kloudke/jovadrops-frontend"
    tag: "latest"
    pullPolicy: "IfNotPresent"
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  authSecret: "super-secret-auth-key-change-me"
  authUrl: "https://jovadrops.kloudke.dpdns.org"
  authGoogleId: ""
  authGoogleSecret: ""
  authAppleId: ""
  authAppleSecret: ""

# ================================================
# Backend (Express) settings
# ================================================
backend:
  name: "jovadrops-backend"
  port: 5000
  replicas: 2
  image:
    repository: "docker.io/kloudke/jovadrops-backend"
    tag: "latest"
    pullPolicy: "IfNotPresent"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

nodeEnv: "production"
nextTelemetryDisabled: "1"

# ================================================
# Service settings
# ================================================
service:
  frontend:
    type: "ClusterIP"
    port: 80
    targetPort: 3000
  backend:
    type: "ClusterIP"
    port: 5000
    targetPort: 5000

# ================================================
# Horizontal Pod Autoscaling (HPA) settings
# ================================================
autoscaling:
  frontend:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  backend:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

# ================================================
# Ingress settings
# ================================================
ingress:
  enabled: true
  className: "traefik"
  host: "jovadrops.kloudke.dpdns.org"
  tlsSecretName: "jovadrops-tls"
  annotations:
    kubernetes.io/ingress.class: "traefik"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: "web-secure"

# ================================================
# PostgreSQL Database settings
# ================================================
postgres:
  enabled: true
  image: "postgres:15-alpine"
  port: 5432
  user: "jovadrops"
  password: "supersecretpassword"
  database: "jovadrops_db"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
      storage: "10Gi"
    limits:
      cpu: "500m"
      memory: "1Gi"

# ================================================
# Node selector settings
# ================================================
nodeSelector:
  kubernetes.io/arch: "amd64"

# ================================================
# Tolerations settings
# ================================================
tolerations:
  - key: "node.kubernetes.io/unreachable"
    operator: "Exists"
    effect: "NoExecute"
    tolerationSeconds: 300

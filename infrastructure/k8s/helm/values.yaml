# ================================================
# Application settings
# ================================================
app:
  name: "jovadrops-web"
  port: 3000
  replicas: 3
  image:
    repository: "ghcr.io/kloudke/jovadrops-web-app"
    tag: "latest"
    pullPolicy: "IfNotPresent"
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

nodeEnv: "production"
nextTelemetryDisabled: "1"

# ================================================
# Service settings
# ================================================
service:
  type: "ClusterIP"
  port: 80
  targetPort: 3000

# ================================================
# Horizontal Pod Autoscaling (HPA) settings
# ================================================
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# ================================================
# Ingress settings
# ================================================
ingress:
  enabled: true
  className: "traefik"
  host: "jovadrops.kloudke.dpdns.org"
  tlsSecretName: "jovadrops-tls"
  annotations:
    kubernetes.io/ingress.class: "traefik"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.entrypoints: "web-secure"

# ================================================
# PostgreSQL Database settings
# ================================================
postgres:
  enabled: true
  image: "postgres:15-alpine"
  port: 5432
  user: "jovadrops"
  password: "supersecretpassword"
  database: "jovadrops_db"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
      storage: "10Gi"
    limits:
      cpu: "500m"
      memory: "1Gi"

# ================================================
# Node selector settings
# ================================================
nodeSelector:
  kubernetes.io/arch: "amd64"

# ================================================
# Tolerations settings
# ================================================
tolerations:
  - key: "node.kubernetes.io/unreachable"
    operator: "Exists"
    effect: "NoExecute"
    tolerationSeconds: 300
